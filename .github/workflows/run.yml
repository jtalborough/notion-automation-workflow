name: Run Notion Automation Script

on:
  push:
    branches:
      - main
      - test-project-fix # Or whichever branch you are working on
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Using a more modern version of Python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          TASK_DATABASE_ID: ${{ secrets.TASK_DATABASE_ID }}
          NOTEBOOK_DATABASE_ID: ${{ secrets.NOTEBOOK_DATABASE_ID }}
        run: python notion_script.py

on:
  push: # This triggers the workflow on push to any branch
  schedule:
    - cron: '0 5-21 * * *'  # Runs at the top of every hour from 5 AM to 9 PM daily
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2  # This checks out your repository code

    - name: Set up Python
      uses: actions/setup-python@v2  # This sets up Python
      with:
        python-version: 3.8  # You can specify the Python version you need

    - name: Install dependencies
      run: pip install -r requirements.txt  # Install any required packages

    - name: Set up environment variables
      run: |
        echo "NOTION_API_TOKEN=${{ secrets.NOTION_API_TOKEN }}" >> $GITHUB_ENV
        echo "TASK_DATABASE_ID=${{ secrets.TASK_DATABASE_ID }}" >> $GITHUB_ENV
        echo "NOTEBOOK_DATABASE_ID=${{ secrets.NOTEBOOK_DATABASE_ID }}" >> $GITHUB_ENV
      env:
        NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        TASK_DATABASE_ID: ${{ secrets.TASK_DATABASE_ID }}
        NOTEBOOK_DATABASE_ID: ${{ secrets.NOTEBOOK_DATABASE_ID }}
        
    - name: Run Python script
      run: python notion_script.py  # Use 'notion_script.py' as the script name
      env:
        NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        TASK_DATABASE_ID: ${{ secrets.TASK_DATABASE_ID }}
        NOTEBOOK_DATABASE_ID: ${{ secrets.NOTEBOOK_DATABASE_ID }}
