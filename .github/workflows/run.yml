name: Run Notion Automation Script

on:
  schedule:
    - cron: '0 5-21 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: check
        type: choice
        options:
          - check
          - dry-run
          - run
      limit:
        description: 'Optional max completed tasks to process'
        required: false
        type: number

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          TASK_DATABASE_ID: ${{ secrets.TASK_DATABASE_ID }}
          NOTEBOOK_DATABASE_ID: ${{ secrets.NOTEBOOK_DATABASE_ID }}
          NOTION_API_VERSION: ${{ vars.NOTION_API_VERSION }}
        run: |
          args=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.mode }}" in
              check) args+=(--check) ;;
              dry-run) args+=(--dry-run) ;;
              run) ;;
              *) echo "Unknown mode: ${{ inputs.mode }}" >&2; exit 1 ;;
            esac
            if [ -n "${{ inputs.limit }}" ]; then
              args+=(--limit "${{ inputs.limit }}")
            fi
          fi
          python notion_script.py "${args[@]}"
