name: Run Notion Automation Script

on:
  push:
    branches:
      - main
      - test-project-fix
  schedule:
    - cron: '0 5-21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          TASK_DATABASE_ID: ${{ secrets.TASK_DATABASE_ID }}
          NOTEBOOK_DATABASE_ID: ${{ secrets.NOTEBOOK_DATABASE_ID }}
          NOTION_API_VERSION: ${{ vars.NOTION_API_VERSION }}
        run: python notion_script.py
